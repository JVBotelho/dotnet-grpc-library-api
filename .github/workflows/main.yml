name: .NET Core Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  build-and-test:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # MinVer needs full history to compute version from git tags

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        # LibrarySystem.Linux.slnf excludes net10.0-windows WPF projects (Tools + Tools.UnitTests)
        # that require the Windows Desktop SDK and cannot be restored on ubuntu-latest.
        run: dotnet restore LibrarySystem.Linux.slnf

      - name: Build
        run: dotnet build LibrarySystem.Linux.slnf --no-restore --configuration Release

      - name: Test with Coverage
        run: >
          dotnet test LibrarySystem.Linux.slnf
          --no-build --configuration Release
          --settings coverage.runsettings
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage

      - name: Merge Coverage Reports
        uses: danielpalme/ReportGenerator-GitHub-Action@v5
        with:
          reports: 'coverage/**/coverage.cobertura.xml'
          targetdir: 'coverage/merged'
          reporttypes: 'Cobertura'

      - name: Code Coverage Summary Report
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        with:
          filename: coverage/merged/Cobertura.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '60 80'

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@331f8f5b4215f0445d3c07b4967662a32a2d3e31 # v2.9.0
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

  test-wpf:
    name: Test WPF Inspector (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # MinVer needs full history to compute version from git tags

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore LibrarySystem.Tools.UnitTests\LibrarySystem.Tools.UnitTests.csproj

      - name: Build
        run: dotnet build LibrarySystem.Tools.UnitTests\LibrarySystem.Tools.UnitTests.csproj --no-restore --configuration Release

      - name: Test with Coverage
        run: >
          dotnet test LibrarySystem.Tools.UnitTests\LibrarySystem.Tools.UnitTests.csproj
          --no-build --configuration Release
          --settings coverage.runsettings
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage-wpf

      - name: Upload WPF Coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wpf-coverage
          path: coverage-wpf/**/coverage.cobertura.xml
